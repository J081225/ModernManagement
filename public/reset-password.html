<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password — Modern Management</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: #0d1117;
      color: white;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .site-foot {
      position: relative;
      z-index: 5;
      margin-top: 32px;
      text-align: center;
      font-size: 0.78em;
      color: rgba(255,255,255,0.3);
    }
    .site-foot .foot-copy { margin-bottom: 10px; font-weight: 500; }
    .site-foot .foot-links { display: flex; gap: 14px; flex-wrap: wrap; justify-content: center; }
    .site-foot .foot-links a { color: rgba(255,255,255,0.35); text-decoration: none; transition: color 0.2s; }
    .site-foot .foot-links a:hover { color: rgba(255,255,255,0.7); }
    .bg-blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(100px);
      opacity: 0.15;
      pointer-events: none;
      z-index: 0;
    }
    .blob-1 { width: 500px; height: 500px; background: #ff6b6b; top: -150px; left: -150px; }
    .blob-2 { width: 400px; height: 400px; background: #667eea; bottom: -100px; right: -100px; }

    .login-card {
      position: relative;
      z-index: 5;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 18px;
      padding: 44px 40px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 30px 80px rgba(0,0,0,0.4);
      backdrop-filter: blur(12px);
    }

    .logo-row {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 32px;
    }
    .logo-badge {
      width: 54px;
      height: 54px;
      background: linear-gradient(135deg, #ff6b6b, #ff8e53);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 1.1em;
      letter-spacing: -1px;
      box-shadow: 0 8px 30px rgba(255,107,107,0.4);
      margin-bottom: 14px;
    }
    .logo-row h2 { font-size: 1.25em; font-weight: 700; color: white; }
    .logo-row p { font-size: 0.82em; color: rgba(255,255,255,0.35); margin-top: 4px; }

    label {
      display: block;
      font-size: 0.82em;
      font-weight: 600;
      color: rgba(255,255,255,0.5);
      margin-bottom: 6px;
      letter-spacing: 0.3px;
    }
    input[type="text"], input[type="password"] {
      width: 100%;
      padding: 12px 14px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 9px;
      color: white;
      font-size: 0.95em;
      font-family: 'Inter', sans-serif;
      outline: none;
      transition: all 0.2s;
      margin-bottom: 18px;
    }
    input[type="text"]:focus, input[type="password"]:focus {
      border-color: rgba(255,107,107,0.6);
      background: rgba(255,255,255,0.1);
      box-shadow: 0 0 0 3px rgba(255,107,107,0.1);
    }
    input::placeholder { color: rgba(255,255,255,0.2); }

    .btn-login {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, #ff6b6b, #ff8e53);
      border: none;
      border-radius: 9px;
      color: white;
      font-size: 0.97em;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.3px;
      box-shadow: 0 6px 20px rgba(255,107,107,0.3);
      transition: all 0.2s;
      margin-top: 4px;
    }
    .btn-login:hover { transform: translateY(-1px); box-shadow: 0 10px 30px rgba(255,107,107,0.45); }
    .btn-login:active { transform: translateY(0); }
    .btn-login:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    .error-msg {
      background: rgba(231,76,60,0.15);
      border: 1px solid rgba(231,76,60,0.35);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.85em;
      color: #ff7675;
      margin-bottom: 18px;
      display: none;
    }

    .back-link {
      text-align: center;
      margin-top: 22px;
      font-size: 0.82em;
      color: rgba(255,255,255,0.25);
    }
    .back-link a { color: rgba(255,255,255,0.4); text-decoration: none; }
    .back-link a:hover { color: rgba(255,255,255,0.7); }

    .success-msg {
      background: rgba(72, 187, 120, 0.15);
      border: 1px solid rgba(72, 187, 120, 0.35);
      border-radius: 8px;
      padding: 14px 16px;
      font-size: 0.9em;
      color: #68d391;
      margin-bottom: 18px;
      line-height: 1.5;
      display: none;
    }
    .info-msg {
      background: rgba(102, 126, 234, 0.15);
      border: 1px solid rgba(102, 126, 234, 0.35);
      border-radius: 8px;
      padding: 14px 16px;
      font-size: 0.9em;
      color: #a3bffa;
      margin-bottom: 18px;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="bg-blob blob-1"></div>
  <div class="bg-blob blob-2"></div>
  <div class="login-card">
    <div class="logo-row">
      <div class="logo-badge">MM</div>
      <h2>Set a new password</h2>
      <p id="subtitle">Verifying your reset link…</p>
    </div>

    <div class="info-msg" id="loadingMsg">Checking your reset link, one moment…</div>
    <div class="error-msg" id="errorMsg"></div>
    <div class="success-msg" id="successMsg"></div>

    <form id="resetForm" onsubmit="handleReset(event)" style="display:none;">
      <label>New password</label>
      <input type="password" id="password" placeholder="Minimum 8 characters" autocomplete="new-password" required />

      <label>Confirm new password</label>
      <input type="password" id="passwordConfirm" placeholder="Re-enter new password" autocomplete="new-password" required />

      <button type="submit" class="btn-login" id="submitBtn">Set new password &rarr;</button>
    </form>

    <div class="back-link" style="margin-top:22px;"><a href="/login">&larr; Back to sign in</a></div>
  </div>

  <footer class="site-foot">
    <div class="foot-copy">&copy; 2026 Modern Management Inc.</div>
    <div class="foot-links">
      <a href="/#features">Features</a>
      <a href="/how-it-works">How It Works</a>
      <a href="/why-ai">Why AI</a>
      <a href="/#pricing">Pricing</a>
      <a href="/signup">Sign Up</a>
      <a href="/terms">Terms</a>
      <a href="/privacy">Privacy</a>
      <a href="/security">Security</a>
      <a href="/sms-consent">SMS Consent</a>
      <a href="/changelog">What's new</a>
    </div>
  </footer>

  <script>
    const params = new URLSearchParams(window.location.search);
    const token = params.get('token') || '';

    async function checkToken() {
      const loadingEl = document.getElementById('loadingMsg');
      const errEl = document.getElementById('errorMsg');
      const formEl = document.getElementById('resetForm');
      const subtitle = document.getElementById('subtitle');

      try {
        const res = await fetch('/api/auth/check-reset-token?token=' + encodeURIComponent(token));
        const data = await res.json();
        loadingEl.style.display = 'none';
        if (data.valid) {
          formEl.style.display = 'block';
          subtitle.textContent = 'Choose a new password for your account.';
        } else {
          let msg = 'This reset link is no longer valid.';
          if (data.reason === 'expired')      msg = 'This reset link has expired. Please request a new one from the login page.';
          else if (data.reason === 'already_used') msg = 'This reset link has already been used. If you need to reset your password again, request a new link.';
          else if (data.reason === 'not_found')    msg = 'This reset link is invalid. It may have been mistyped or already used.';
          errEl.textContent = msg;
          errEl.style.display = 'block';
          subtitle.textContent = '';
        }
      } catch (err) {
        loadingEl.style.display = 'none';
        errEl.textContent = 'Connection error. Please refresh and try again.';
        errEl.style.display = 'block';
      }
    }

    async function handleReset(e) {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      const errEl = document.getElementById('errorMsg');
      const successEl = document.getElementById('successMsg');
      errEl.style.display = 'none';
      successEl.style.display = 'none';

      const password = document.getElementById('password').value;
      const passwordConfirm = document.getElementById('passwordConfirm').value;

      if (password.length < 8) {
        errEl.textContent = 'Password must be at least 8 characters.';
        errEl.style.display = 'block';
        return;
      }
      if (password !== passwordConfirm) {
        errEl.textContent = 'Passwords do not match.';
        errEl.style.display = 'block';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Setting password…';

      try {
        const res = await fetch('/api/auth/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, password }),
        });
        const data = await res.json();
        if (res.ok && data.success) {
          successEl.textContent = 'Password reset! Redirecting to sign in…';
          successEl.style.display = 'block';
          document.getElementById('resetForm').style.display = 'none';
          setTimeout(() => { window.location.href = '/login'; }, 2000);
        } else {
          errEl.textContent = data.error || 'Could not reset password. Please try again.';
          errEl.style.display = 'block';
          btn.disabled = false;
          btn.textContent = 'Set new password →';
        }
      } catch (err) {
        errEl.textContent = 'Connection error. Please try again.';
        errEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Set new password →';
      }
    }

    window.addEventListener('DOMContentLoaded', checkToken);
  </script>
</body>
</html>
