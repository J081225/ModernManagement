<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Account — Modern Management</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: #0d1117;
      color: white;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .site-foot {
      position: relative;
      z-index: 5;
      margin-top: 32px;
      text-align: center;
      font-size: 0.78em;
      color: rgba(255,255,255,0.3);
    }
    .site-foot .foot-copy { margin-bottom: 10px; font-weight: 500; }
    .site-foot .foot-links { display: flex; gap: 14px; flex-wrap: wrap; justify-content: center; }
    .site-foot .foot-links a { color: rgba(255,255,255,0.35); text-decoration: none; transition: color 0.2s; }
    .site-foot .foot-links a:hover { color: rgba(255,255,255,0.7); }
    .bg-blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(100px);
      opacity: 0.15;
      pointer-events: none;
      z-index: 0;
    }
    .blob-1 { width: 500px; height: 500px; background: #667eea; top: -150px; left: -150px; }
    .blob-2 { width: 400px; height: 400px; background: #ff6b6b; bottom: -100px; right: -100px; }

    .signup-card {
      position: relative;
      z-index: 5;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 18px;
      padding: 44px 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 30px 80px rgba(0,0,0,0.4);
      backdrop-filter: blur(12px);
    }

    .logo-row {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 28px;
    }
    .logo-badge {
      width: 54px;
      height: 54px;
      background: linear-gradient(135deg, #ff6b6b, #ff8e53);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 1.1em;
      letter-spacing: -1px;
      box-shadow: 0 8px 30px rgba(255,107,107,0.4);
      margin-bottom: 14px;
    }
    .logo-row h2 { font-size: 1.25em; font-weight: 700; color: white; }
    .logo-row p { font-size: 0.82em; color: rgba(255,255,255,0.35); margin-top: 4px; }

    label {
      display: block;
      font-size: 0.82em;
      font-weight: 600;
      color: rgba(255,255,255,0.5);
      margin-bottom: 6px;
      letter-spacing: 0.3px;
    }
    input[type="text"], input[type="password"], input[type="email"] {
      width: 100%;
      padding: 12px 14px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 9px;
      color: white;
      font-size: 0.95em;
      font-family: 'Inter', sans-serif;
      outline: none;
      transition: all 0.2s;
      margin-bottom: 16px;
    }
    input:focus {
      border-color: rgba(255,107,107,0.6);
      background: rgba(255,255,255,0.1);
      box-shadow: 0 0 0 3px rgba(255,107,107,0.1);
    }
    input::placeholder { color: rgba(255,255,255,0.2); }

    .password-hint {
      font-size: 0.75em;
      color: rgba(255,255,255,0.25);
      margin-top: -10px;
      margin-bottom: 16px;
    }

    .btn-signup {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, #ff6b6b, #ff8e53);
      border: none;
      border-radius: 9px;
      color: white;
      font-size: 0.97em;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.3px;
      box-shadow: 0 6px 20px rgba(255,107,107,0.3);
      transition: all 0.2s;
      margin-top: 4px;
    }
    .btn-signup:hover { transform: translateY(-1px); box-shadow: 0 10px 30px rgba(255,107,107,0.45); }
    .btn-signup:active { transform: translateY(0); }
    .btn-signup:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    .error-msg {
      background: rgba(231,76,60,0.15);
      border: 1px solid rgba(231,76,60,0.35);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.85em;
      color: #ff7675;
      margin-bottom: 18px;
      display: none;
    }

    .signin-link {
      text-align: center;
      margin-top: 22px;
      font-size: 0.82em;
      color: rgba(255,255,255,0.25);
    }
    .signin-link a { color: rgba(255,107,107,0.8); text-decoration: none; font-weight: 600; }
    .signin-link a:hover { color: #ff6b6b; }

    .plan-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(255,107,107,0.1);
      border: 1px solid rgba(255,107,107,0.2);
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 0.75em;
      color: #ff8e53;
      font-weight: 600;
      margin-bottom: 24px;
    }
  </style>
</head>
<body>

  <div class="bg-blob blob-1"></div>
  <div class="bg-blob blob-2"></div>

  <div class="signup-card">
    <div class="logo-row">
      <div class="logo-badge">MM</div>
      <h2>Create Your Account</h2>
      <p>Modern Management — free to get started</p>
    </div>

    <div style="text-align:center;">
      <div class="plan-badge">&#10003; Free plan &nbsp;&middot;&nbsp; No credit card required</div>
    </div>

    <div class="error-msg" id="errorMsg"></div>

    <form id="signupForm" onsubmit="handleSignup(event)">
      <label>Username</label>
      <input type="text" id="username" placeholder="Choose a username" autocomplete="username" required />

      <label>Email <span style="color:rgba(255,255,255,0.2);font-weight:400;">(optional)</span></label>
      <input type="email" id="email" placeholder="you@example.com" autocomplete="email" />

      <label>Password</label>
      <input type="password" id="password" placeholder="At least 8 characters" autocomplete="new-password" required />
      <div class="password-hint">Minimum 8 characters</div>

      <label>Confirm Password</label>
      <input type="password" id="confirmPassword" placeholder="Repeat your password" autocomplete="new-password" required />

      <button type="submit" class="btn-signup" id="signupBtn">Create Account &rarr;</button>
    </form>

    <div class="signin-link">Already have an account? <a href="/login">Sign in</a></div>
  </div>

  <footer class="site-foot">
    <div class="foot-copy">&copy; 2026 Modern Management Inc.</div>
    <div class="foot-links">
      <a href="/#features">Features</a>
      <a href="/how-it-works">How It Works</a>
      <a href="/why-ai">Why AI</a>
      <a href="/#pricing">Pricing</a>
      <a href="/login">Sign In</a>
      <a href="/terms">Terms</a>
      <a href="/privacy">Privacy</a>
      <a href="/security">Security</a>
      <a href="/sms-consent">SMS Consent</a>
    </div>
  </footer>

  <script>
    async function handleSignup(e) {
      e.preventDefault();
      const btn = document.getElementById('signupBtn');
      const err = document.getElementById('errorMsg');
      err.style.display = 'none';

      const username = document.getElementById('username').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const confirm = document.getElementById('confirmPassword').value;

      if (password !== confirm) {
        err.textContent = 'Passwords do not match.';
        err.style.display = 'block';
        return;
      }
      if (password.length < 8) {
        err.textContent = 'Password must be at least 8 characters.';
        err.style.display = 'block';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Creating account…';

      try {
        const res = await fetch('/api/signup', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, email, password })
        });
        const data = await res.json();
        if (res.ok) {
          window.location.href = '/workspace';
        } else {
          err.textContent = data.error || 'Signup failed. Please try again.';
          err.style.display = 'block';
          btn.disabled = false;
          btn.textContent = 'Create Account →';
        }
      } catch {
        err.textContent = 'Connection error. Please try again.';
        err.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Create Account →';
      }
    }
  </script>

</body>
</html>
