<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment integration coming — Modern Management</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #f8fafc, #eef2ff);
      color: #2d3748;
      min-height: 100vh;
      padding: 40px 16px;
    }
    .container { max-width: 540px; margin: 0 auto; }
    .logo {
      text-align: center; font-size: 1.4em; font-weight: 800;
      color: #ff6b6b; margin-bottom: 24px;
    }
    .card {
      background: white; border-radius: 14px; padding: 32px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.05);
    }
    h1 { margin: 0 0 8px; font-size: 1.4em; color: #2d3748; }
    .subtitle { color: #94a3b8; font-size: 0.92em; margin-bottom: 24px; line-height: 1.5; }
    .data-block {
      background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px;
      padding: 16px; font-family: ui-monospace, 'SF Mono', Menlo, monospace;
      font-size: 0.86em; line-height: 1.7; color: #475569;
    }
    .data-block .key { color: #94a3b8; }
    .data-block .val { color: #2d3748; font-weight: 600; }
    .btn-primary {
      background: linear-gradient(135deg, #ff6b6b, #ff8e53);
      color: white; border: none; border-radius: 8px;
      padding: 12px 22px; font-size: 0.94em; font-weight: 600; cursor: pointer;
      font-family: inherit;
    }
    .btn-secondary {
      background: white; color: #475569; border: 1.5px solid #e2e8f0;
      border-radius: 8px; padding: 12px 22px;
      font-size: 0.94em; font-weight: 600; cursor: pointer;
      text-decoration: none; display: inline-block; font-family: inherit;
    }
    .btn-row { display: flex; gap: 12px; margin-top: 24px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">Modern Management</div>
    <div class="card">
      <h1>Payment integration coming in B2</h1>
      <p class="subtitle">This is a placeholder for the Stripe Checkout step. Below is the captured form state — sanity-check that the multi-screen state-preservation worked end-to-end.</p>
      <div class="data-block" id="captured-data">Loading&hellip;</div>
      <div class="btn-row">
        <button class="btn-primary" onclick="startOver()">Start Over</button>
        <a href="/" class="btn-secondary">Back to home</a>
      </div>
    </div>
  </div>

  <script>
    function escapeHtml(s) {
      return String(s).replace(/[<>&"']/g, c =>
        ({ '<': '&lt;', '>': '&gt;', '&': '&amp;', '"': '&quot;', "'": '&#39;' }[c])
      );
    }

    function renderCaptured() {
      const el = document.getElementById('captured-data');
      const raw = sessionStorage.getItem('signupDraft');
      if (!raw) {
        el.innerHTML = '<span class="key">No draft data &mdash; sessionStorage is empty.</span>';
        return;
      }
      let d;
      try { d = JSON.parse(raw); }
      catch (e) {
        el.innerHTML = '<span class="key">Could not parse draft data.</span>';
        return;
      }
      const fields = [
        ['Username',            d.username],
        ['Email',               d.email],
        ['Business name',       d.business_name],
        ['Units managed',       d.units],
        ['Property type',       d.property_type],
        ['Preferred area code', d.area_code || '(any)'],
        ['Backup area code',    d.area_code_backup || '(none)'],
        ['Alert phone',         d.alert_phone || '(none)'],
        ['Billing',             d.billing],
        ['Plan',                d.plan],
      ];
      el.innerHTML = fields.map(([k, v]) =>
        '<div><span class="key">' + escapeHtml(k) + ':</span> ' +
        '<span class="val">' +
          (v != null && v !== '' ? escapeHtml(String(v)) : '<i>(empty)</i>') +
        '</span></div>'
      ).join('');
    }

    function startOver() {
      sessionStorage.removeItem('signupDraft');
      window.location.href = '/signup';
    }

    window.addEventListener('DOMContentLoaded', renderCaptured);
  </script>
</body>
</html>
