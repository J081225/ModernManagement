<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment canceled — Modern Management</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #f8fafc, #eef2ff);
      color: #2d3748;
      min-height: 100vh;
      padding: 40px 16px;
    }
    .container { max-width: 540px; margin: 0 auto; }
    .logo {
      text-align: center; font-size: 1.4em; font-weight: 800;
      color: #ff6b6b; margin-bottom: 24px;
    }
    .card {
      background: white; border-radius: 14px; padding: 32px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.05);
    }
    h1 { margin: 0 0 8px; font-size: 1.4em; color: #2d3748; text-align: center; }
    .subtitle { color: #94a3b8; font-size: 0.92em; margin-bottom: 24px; line-height: 1.5; text-align: center; }
    .debug-block {
      background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px;
      padding: 14px 16px; font-family: ui-monospace, 'SF Mono', Menlo, monospace;
      font-size: 0.82em; line-height: 1.7; color: #475569;
      margin-bottom: 18px;
    }
    .debug-block .key { color: #94a3b8; }
    .debug-block .val { color: #2d3748; font-weight: 600; word-break: break-all; }
    .btn-primary {
      background: linear-gradient(135deg, #ff6b6b, #ff8e53);
      color: white; border: none; border-radius: 8px;
      padding: 12px 22px; font-size: 0.94em; font-weight: 600; cursor: pointer;
      font-family: inherit; text-decoration: none; display: inline-block;
    }
    .btn-secondary {
      background: white; color: #475569; border: 1.5px solid #e2e8f0;
      border-radius: 8px; padding: 12px 22px;
      font-size: 0.94em; font-weight: 600; cursor: pointer;
      text-decoration: none; display: inline-block; font-family: inherit;
    }
    .btn-row { display: flex; gap: 12px; margin-top: 12px; flex-wrap: wrap; }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">Modern Management</div>
    <div class="card">
      <h1>Payment canceled</h1>
      <p class="subtitle">No charge was made. Your form details are still saved &mdash; head back to signup to try again.</p>

      <!-- DEBUG: remove before production. -->
      <div class="debug-block" id="debug-block">Loading&hellip;</div>

      <div class="btn-row">
        <a href="/signup" class="btn-primary">Back to signup</a>
        <a href="/" class="btn-secondary">Back to home</a>
      </div>
    </div>
  </div>

  <script>
    function escapeHtml(s) {
      return String(s).replace(/[<>&"']/g, c =>
        ({ '<': '&lt;', '>': '&gt;', '&': '&amp;', '"': '&quot;', "'": '&#39;' }[c])
      );
    }

    function renderDebug() {
      const params = new URLSearchParams(window.location.search);
      const draft_id = params.get('draft_id');
      const el = document.getElementById('debug-block');
      el.innerHTML =
        '<div><span class="key">DEBUG &mdash; remove before production:</span></div>' +
        '<div><span class="key">draft_id:</span> <span class="val">' + escapeHtml(draft_id || '(missing)') + '</span></div>';
    }

    window.addEventListener('DOMContentLoaded', renderDebug);
    // Note: sessionStorage.signupDraft is intentionally NOT cleared here —
    // the user may want to retry, in which case the form should auto-restore
    // their entered values when they click "Back to signup".
  </script>
</body>
</html>
